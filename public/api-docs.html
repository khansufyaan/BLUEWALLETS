<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Wallets — API Reference</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='url(%23g)'/><defs><linearGradient id='g' x1='0' y1='0' x2='32' y2='32'><stop stop-color='%232563EB'/><stop offset='1' stop-color='%237C3AED'/></linearGradient></defs><text x='7' y='23' font-size='18' fill='white' font-family='system-ui' font-weight='700'>B</text></svg>">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    /* Override dashboard layout — standalone full-screen */
    body { background: var(--bg-root); }

    .api-standalone-topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(9, 9, 11, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 24px;
    }

    .api-standalone-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .api-standalone-brand img {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }

    .api-standalone-brand-text {
      font-weight: 600;
      font-size: 14px;
      color: var(--text-primary);
    }

    .api-standalone-divider {
      width: 1px;
      height: 16px;
      background: var(--border);
    }

    .api-standalone-label {
      font-size: 13px;
      color: var(--text-tertiary);
      font-weight: 500;
    }

    .api-standalone-back {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-tertiary);
      text-decoration: none;
      transition: color 0.15s;
    }

    .api-standalone-back:hover { color: var(--text-secondary); }

    .api-docs {
      height: calc(100vh - 56px);
    }

    /* Remove dashboard offsets */
    .api-docs-sidebar {
      border-radius: 0;
    }
  </style>
</head>
<body>
  <header class="api-standalone-topbar">
    <a href="/" class="api-standalone-brand">
      <img src="/img/logo.png" alt="Blue">
      <span class="api-standalone-brand-text">Blue Wallets</span>
    </a>
    <span class="api-standalone-divider"></span>
    <span class="api-standalone-label">API Reference</span>
    <a href="/" class="api-standalone-back">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8.5 2.5L4 7l4.5 4.5"/></svg>
      Dashboard
    </a>
  </header>

  <div id="api-root"></div>

  <script type="module">
    import { renderApiDocs, initApiDocs } from '/js/pages/api-docs.js';

    const root = document.getElementById('api-root');
    try {
      root.innerHTML = await renderApiDocs();
      initApiDocs();
    } catch (err) {
      root.innerHTML = `<div style="padding:40px;color:#EF4444">${err.message}</div>`;
    }
  </script>
</body>
</html>
