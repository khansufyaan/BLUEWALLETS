# Blue Agent stack — AI agent with fully on-prem LLM
#
# Quick start (POC, CPU, default Qwen 7B ~5GB):
#   docker-compose -f docker-compose.yml -f docker-compose.agent.yml up -d
#
# Production (GPU, Llama 70B):
#   cp .env.agent.production .env.agent
#   docker-compose -f docker-compose.yml -f docker-compose.agent.yml -f docker-compose.agent.gpu.yml up -d

services:
  # Ollama — on-prem LLM server (OpenAI-compatible API)
  # Pinned to a specific version for reproducibility
  ollama:
    image: ollama/ollama:0.3.14
    container_name: blue-ollama
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_MAX_LOADED_MODELS: "${OLLAMA_MAX_LOADED_MODELS:-1}"
      OLLAMA_NUM_PARALLEL: "${OLLAMA_NUM_PARALLEL:-2}"
      OLLAMA_FLASH_ATTENTION: "1"
      OLLAMA_MODELS: /root/.ollama/models
    ports:
      - "11434:11434"
    networks:
      - blue-internal
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEM_LIMIT:-16G}
          cpus: '${OLLAMA_CPU_LIMIT:-4}'
        reservations:
          memory: 4G

  # Pull LLM + embeddings models on first boot (one-shot)
  ollama-init:
    image: ollama/ollama:0.3.14
    container_name: blue-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: /bin/sh
    command: >
      -c "
        echo 'Pulling LLM: ${LLM_MODEL:-qwen2.5:7b-instruct}';
        ollama pull ${LLM_MODEL:-qwen2.5:7b-instruct} || true;
        echo 'Pulling embeddings: nomic-embed-text';
        ollama pull nomic-embed-text || true;
        echo 'All models ready.';
      "
    environment:
      OLLAMA_HOST: http://ollama:11434
    networks:
      - blue-internal
    restart: "no"

  # Whisper.cpp — free, on-prem speech-to-text server
  # Uses ggml base.en model (~150MB). Runs on CPU, near real-time.
  # Pinned to digest-locked image.
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:v1.4.1
    container_name: blue-whisper
    environment:
      ASR_MODEL: base.en
      ASR_ENGINE: openai_whisper
    networks:
      - blue-internal
    ports:
      - "8081:9000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M

  # Blue Agent — tool-calling orchestrator
  blue-agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    image: ghcr.io/khansufyaan/blue-agent:latest
    container_name: blue-agent
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - agent_data:/data
    environment:
      CONVERSATION_DATA_DIR: /data/conversations
      AGENT_PORT: 3500
      LLM_URL: http://ollama:11434/v1
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:7b-instruct}
      LLM_API_KEY: ollama
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-2048}
      GATEWAY_URL: http://blue-console:3400
      DRIVER_URL: http://blue-driver:3100
      INTERNAL_AUTH_KEY: ${INTERNAL_AUTH_KEY:-}
      AGENT_AUTH_KEY: ${AGENT_AUTH_KEY:-}
      ALLOW_WRITE_TOOLS: "${ALLOW_WRITE_TOOLS:-true}"
      REQUIRE_APPROVAL: "${REQUIRE_APPROVAL:-true}"
      EMBED_MODEL: nomic-embed-text
      WHISPER_URL: http://whisper:9000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3400}
    ports:
      - "3500:3500"
    networks:
      - blue-internal
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3500/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
        reservations:
          memory: 128M

volumes:
  ollama_models:
    driver: local
  agent_data:
    driver: local

networks:
  blue-internal:
    driver: bridge
    # For air-gap deployments, set internal: true
    # internal: true
