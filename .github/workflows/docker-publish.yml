name: Build & Publish Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-driver:
    name: Build Blue Driver
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Blue Driver
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.driver
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/blue-driver:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/blue-driver:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-console:
    name: Build Blue Console
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Blue Console
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          file: ./gateway/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/blue-console:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/blue-console:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
