<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Driver</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='url(%23g)'/><defs><linearGradient id='g' x1='0' y1='0' x2='32' y2='32'><stop stop-color='%232563EB'/><stop offset='1' stop-color='%237C3AED'/></linearGradient></defs><text x='7' y='23' font-size='18' fill='white' font-family='system-ui' font-weight='700'>B</text></svg>">
</head>
<body>
  <!-- Login (shown when not authenticated) -->
  <div id="login-container"></div>

  <!-- App Shell (shown when authenticated) -->
  <div id="app-shell" class="app-layout hidden">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="/img/logo.png" alt="Blue" style="width:32px;height:32px;border-radius:8px">
        <span class="logo-text">Blue Driver</span>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">HSM</div>
        <a href="#/" class="nav-item" data-page="ceremony">
          <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 2l6 3v4c0 3.5-2.5 6.5-6 7.5C5.5 15.5 3 12.5 3 9V5l6-3z"/><circle cx="9" cy="9" r="1.5" fill="currentColor"/></svg>
          Key Ceremony
        </a>
        <a href="#/health" class="nav-item" data-page="health">
          <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 9h3l2-5 2 10 2-5h5"/></svg>
          HSM Health
        </a>

        <div class="nav-section">ADMIN</div>
        <a href="#/users" class="nav-item" data-page="users">
          <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="6" r="3"/><path d="M3 16c0-3 2.7-5 6-5s6 2 6 5"/></svg>
          Users
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="hsm-status" id="hsm-status">
          <div class="hsm-dot"></div>
          <div>
            <div class="hsm-status-text">Luna HSM Connected</div>
            <div class="hsm-status-detail">FIPS 140-3 Level 3</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <header class="topbar">
        <div class="topbar-title" id="page-title">Dashboard</div>
        <div class="topbar-actions">
          <div class="user-menu" id="user-menu">
            <div class="user-avatar">A</div>
            <span>Admin</span>
          </div>
          <button class="btn btn-ghost btn-sm" id="logout-btn">Logout</button>
        </div>
      </header>
      <div id="page-content"></div>
    </main>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
