# ============================================================
# Blue Wallets — Client Deployment
#
# Usage:
#   1. Generate mTLS certificates:  ./certs/generate-certs.sh
#   2. Create .env file (see below)
#   3. Start:  docker compose -f docker-compose.client.yml up -d
#   4. Open Blue Driver:  http://localhost:3100  (Key Ceremony)
#   5. Open Blue Console: http://localhost:3400  (Operations)
#
# Required .env file:
#   POSTGRES_PASSWORD=<strong-password>    # 16+ chars, mixed case + symbols
#   INTERNAL_AUTH_KEY=<random-64-char-string>
#   ETH_RPC_URL=https://eth-sepolia.g.alchemy.com/v2/<your-key>
# ============================================================

services:
  # ─── PostgreSQL (Secure Zone) ────────────────────────────────
  postgres:
    image: postgres:16.4-alpine
    container_name: blue-postgres
    environment:
      POSTGRES_DB: bluewallets
      POSTGRES_USER: blue
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blue -d bluewallets"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M

  # ─── Blue Driver (Secure Zone — No Internet) ────────────────
  blue-driver:
    image: ghcr.io/khansufyaan/blue-driver:latest
    container_name: blue-driver
    ports:
      # Single-VM enterprise layout: Driver dashboard on 80 (one-time key ceremony),
      # Console Ops on 443 (daily use). Override DRIVER_PORT to change.
      - "${DRIVER_PORT:-80}:3100"     # Driver dashboard (key ceremony)
      - "${INTERNAL_PORT:-3200}:3200" # Internal API (mTLS, docker network only)
    environment:
      - PORT=3100
      - INTERNAL_PORT=3200
      - NODE_ENV=production
      - MTLS_ENABLED=true
      - INTERNAL_AUTH_KEY=${INTERNAL_AUTH_KEY:?INTERNAL_AUTH_KEY is required}
      - DATABASE_URL=postgresql://blue:${POSTGRES_PASSWORD}@postgres:5432/bluewallets
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./certs:/app/certs:ro
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fs", "-o", "/dev/null", "-w", "%{http_code}", "http://localhost:3100/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M

  # ─── Blue Console / Gateway (DMZ — Internet Access) ────────────────
  blue-console:
    image: ghcr.io/khansufyaan/blue-console:latest
    container_name: blue-console
    ports:
      # Enterprise VMs typically only permit 80 + 443 externally. Driver holds 80
      # (key ceremony), Console Ops holds 443 (daily dashboard). Bank API is
      # mapped to a local-only port (3300) — reachable from the VM for testing,
      # but production clients reach it via an upstream reverse proxy.
      - "${OPS_PORT_EXT:-443}:3400"   # Ops dashboard    (container :3400)
      - "127.0.0.1:${API_PORT:-3300}:3100"  # Bank-facing API (loopback only)
    environment:
      - PORT=3100
      - OPS_PORT=3400
      - SIGNER_URL=https://blue-driver:3200
      - INTERNAL_AUTH_KEY=${INTERNAL_AUTH_KEY:?INTERNAL_AUTH_KEY is required}
      - CERTS_DIR=/app/certs
      - ETH_RPC_URL=${ETH_RPC_URL:-https://eth-sepolia.g.alchemy.com/v2/demo}
      - ETH_CHAIN_ID=${ETH_CHAIN_ID:-11155111}
      - DEPOSIT_POLL_MS=15000
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - CORS_ORIGIN=${CORS_ORIGIN:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - AGENT_URL=${AGENT_URL:-http://blue-agent:3500}
      # Ops Dashboard TLS — off by default (self-signed cert on a VM IP is blocked
      # by Chrome). Set to "false" to re-enable when fronting with a proper CA cert.
      - OPS_TLS_DISABLE=${OPS_TLS_DISABLE:-true}
    volumes:
      - ./certs:/app/certs:ro
    networks:
      - internal
      - internet
    depends_on:
      blue-driver:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3100/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
        reservations:
          memory: 256M

networks:
  internal:
    driver: bridge
    # For tier-1 bank deployments, add: internal: true
    # (prevents egress from secure zone — requires outbound proxy for RPC)
  internet:
    driver: bridge

volumes:
  pgdata:
    driver: local
